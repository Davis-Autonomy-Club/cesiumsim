<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RL Training - Drone Sim</title>
  <link rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #eee;
      font-family: 'Menlo', 'Consolas', monospace;
    }

    #cesiumContainer {
      width: 100%;
      height: 100%;
    }

    /* Hide Cesium credits widget */
    .cesium-widget-credits,
    .cesium-credit-logoContainer,
    .cesium-credit-textContainer {
      display: none !important;
    }

    #training-hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.75);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
      z-index: 10;
      min-width: 220px;
    }

    #training-hud .title {
      font-size: 14px;
      font-weight: bold;
      color: #0f0;
      margin-bottom: 6px;
    }

    #training-hud .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    #training-hud .label {
      color: #aaa;
    }

    #training-hud .value {
      color: #fff;
      font-weight: bold;
    }

    #training-controls {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.75);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.8;
      z-index: 10;
    }

    #training-controls code {
      background: rgba(255, 255, 255, 0.15);
      padding: 1px 4px;
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <div id="training-hud">
    <div class="title">RL Training</div>
    <div class="row">
      <span class="label">Level</span>
      <span class="value" id="hud-level">1</span>
    </div>
    <div class="row">
      <span class="label">Task</span>
      <span class="value" id="hud-task">Hover & Land</span>
    </div>
    <div class="row">
      <span class="label">Difficulty</span>
      <span class="value" id="hud-difficulty">0.0</span>
    </div>
    <div class="row">
      <span class="label">Episode</span>
      <span class="value" id="hud-episode">0</span>
    </div>
    <div class="row">
      <span class="label">Step</span>
      <span class="value" id="hud-step">0</span>
    </div>
    <div class="row">
      <span class="label">Reward</span>
      <span class="value" id="hud-reward">0.0</span>
    </div>
    <div class="row">
      <span class="label">AGL</span>
      <span class="value" id="hud-agl">0.0 m</span>
    </div>
    <div class="row">
      <span class="label">Speed</span>
      <span class="value" id="hud-speed">0.0 m/s</span>
    </div>
    <div class="row">
      <span class="label">Status</span>
      <span class="value" id="hud-status">Initializing...</span>
    </div>
  </div>

  <div id="training-controls">
    <div style="font-weight: bold; margin-bottom: 4px;">Manual Controls</div>
    <div><code>W</code>/<code>S</code> ascend/descend | <code>A</code>/<code>D</code> strafe</div>
    <div><code>↑</code>/<code>↓</code> forward/back | <code>←</code>/<code>→</code> yaw</div>
    <div><code>R</code> reset episode | <code>1-5</code> set level</div>
    <div><code>N</code> random step | <code>T</code> run 100 random episodes</div>
  </div>

  <script type="module" src="./rl-training/main.js"></script>
</body>

</html>
